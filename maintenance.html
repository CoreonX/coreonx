<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Em Manutenção | Portal Corporativo</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            overflow: hidden;
            font-family: 'Rajdhani', sans-serif;
            background-color: #050505;
        }

        .background-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1a0b2e 0%, #050505 100%);
            overflow: hidden;
        }

        .background-container::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 20% 20%, rgba(0,255,255,0.08), transparent 24%),
                radial-gradient(circle at 80% 70%, rgba(138,43,226,0.12), transparent 28%),
                radial-gradient(circle at 50% 0%, rgba(255,255,255,0.03), transparent 30%);
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            padding: 4rem 6rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 0 40px rgba(138, 43, 226, 0.2);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 5rem;
            color: #ffffff;
            letter-spacing: 12px;
            text-transform: uppercase;
            margin-bottom: 1rem;
            text-shadow:
                0 0 10px #00ffff,
                0 0 20px #00ffff,
                0 0 40px #00ffff,
                0 0 80px #8a2be2;
            animation: pulse-neon 3s infinite alternate;
        }

        p {
            color: #b3b3b3;
            font-size: 1.5rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .status-indicator {
            margin-top: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            color: #8f8f8f;
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(0, 255, 255, 0.5);
            animation: dot-pulse 2s infinite;
        }

        @keyframes pulse-neon {
            0%   { text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff, 0 0 40px #00ffff; }
            100% { text-shadow: 0 0 10px #8a2be2, 0 0 20px #8a2be2, 0 0 40px #8a2be2, 0 0 80px #00ffff; }
        }

        @keyframes dot-pulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50%       { opacity: 1;   transform: scale(1.4); }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 3rem;
                letter-spacing: 6px;
            }
            .content {
                padding: 2.5rem 2rem;
                width: 90%;
            }
            p {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="background-container">
        <div class="content">
            <h1>MANUTENÇÃO</h1>
            <p>Voltamos em breve com novidades!</p>
            <div class="status-indicator">
                <span class="status-dot"></span>
                <span id="status-text">Verificando sistema...</span>
            </div>
        </div>
    </div>

    <script>
        var CHECK_INTERVAL = 30000;
        var basePath = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/')) || '';
        var STATUS_ENDPOINT = (basePath ? basePath + '/' : '') + 'maintenance-status.json';
        var isChecking = false;
        var statusText = document.getElementById('status-text');

        function checkSiteStatus() {
            if (isChecking) return;
            isChecking = true;

            var cacheBuster = '?_=' + Date.now();

            fetch(STATUS_ENDPOINT + cacheBuster, {
                method: 'GET',
                cache: 'no-store',
                headers: {
                    'Cache-Control': 'no-cache, no-store, must-revalidate',
                    'Pragma': 'no-cache'
                }
            })
            .then(function(response) {
                if (!response.ok) throw new Error('HTTP ' + response.status);
                return response.json();
            })
            .then(function(data) {
                if (data.status === 'operational') {
                    if (statusText) statusText.textContent = 'Sistema restaurado. Redirecionando...';
                    setTimeout(function() {
                        window.location.replace(basePath || '/');
                    }, 1000);
                } else {
                    if (statusText) statusText.textContent = 'Manutenção em andamento...';
                }
            })
            .catch(function() {
                if (statusText) statusText.textContent = 'Verificando sistema...';
            })
            .finally(function() {
                isChecking = false;
            });
        }

        // Primeira verificação após 2s; repetição a cada 30s
        setTimeout(function() {
            checkSiteStatus();
            setInterval(checkSiteStatus, CHECK_INTERVAL);
        }, 2000);
    </script>
</body>
</html>
