<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>coreonx // tech_space</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>

  <!-- Background gradient -->
  <div class="fullscreen-layer bg-gradient"></div>

  <!-- Animated waves -->
  <div class="fullscreen-layer wave-container">
    <div class="wave" style="animation-duration:18s"></div>
    <div class="wave wave--alt"></div>
    <div class="wave wave--far"></div>
  </div>

  <!-- Grid overlay -->
  <div class="fullscreen-layer grid-overlay"></div>

  <!-- Floating particles (generated by scripts/main.js) -->
  <div class="fullscreen-layer particle-container"></div>

  <!-- Main content -->
  <div class="main-wrapper flex-center">
    <div class="card">
      <!-- Avatar -->
      <div class="avatar flex-center">
        <img src="https://github.com/CoreonX.png" alt="CoreonX">
      </div>

      <!-- Corner decorations (generated by scripts/main.js) -->

      <h1 class="title">coreonx</h1>
      <p class="tagline">
        [ Systems Design ]<br>
        Between idea and reality, there is <span>code</span>.
      </p>
    </div>
  </div>

  <script src="scripts/main.js"></script>
</body>
</html>
