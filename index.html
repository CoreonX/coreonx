<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>coreonx // tech_space</title>
    <!-- Fontes Sci-Fi e Tecnológicas -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        /* Reset de Tela */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            background-color: #020208; /* Cor de segurança caso tudo falhe */
            color: #ffffff;
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
        }

        /* --- BACKGROUND ULTRA-COMPATÍVEL (CSS PURO À PROVA DE FALHAS) --- */
        .tech-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            
            /* Padrão de linhas e fluxo tecnológico cruzado feito com gradientes nativos */
            background: 
                linear-gradient(90deg, rgba(0, 242, 254, 0.03) 1px, transparent 1px),
                linear-gradient(rgba(0, 242, 254, 0.03) 1px, transparent 1px),
                linear-gradient(45deg, rgba(138, 43, 226, 0.05) 25%, transparent 25%, transparent 75%, rgba(138, 43, 226, 0.05) 75%),
                radial-gradient(circle at 50% 50%, #0c0d28 0%, #020208 100%);
            
            background-size: 40px 40px, 40px 40px, 80px 80px, 100% 100%;
            
            /* Animação ultra-simples de deslocamento de malha técnica (fluxo de dados) */
            animation: techFlux 20s linear infinite;
        }

        /* --- CONTAINER ULTRA-WIDE (1650PX) --- */
        .main-container {
            max-width: 1650px;
            width: 100%;
            height: 100vh;
            margin: 0 auto;
            padding: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Card Tecnológico Sólido (Sem propriedades de desfoque/blur que causam bloqueio) */
        .cyber-card {
            background: #040614; /* Fundo sólido escuro para evitar falha de opacidade */
            border: 2px solid rgba(0, 242, 254, 0.25);
            border-radius: 20px;
            padding: 4.5rem 6rem;
            text-align: center;
            max-width: 850px;
            width: 100%;
            box-shadow: 0 0 40px rgba(0, 242, 254, 0.1);
            position: relative;
        }

        /* Detalhes nos quatro cantos do card (Estilo Interface HUD) */
        .cyber-card::before, .cyber-card::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            border-color: #00f2fe;
            border-style: solid;
            pointer-events: none;
        }
        /* Cantos Superiores */
        .cyber-card::before {
            top: 15px; left: 15px;
            border-width: 2px 0 0 2px;
        }
        /* Cantos Inferiores */
        .card-corners::before, .card-corners::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            border-color: #00f2fe;
            border-style: solid;
            pointer-events: none;
        }
        .card-corners::before {
            bottom: 15px; left: 15px;
            border-width: 0 0 2px 2px;
        }
        .cyber-card::after {
            top: 15px; right: 15px;
            border-width: 2px 2px 0 0;
        }
        .card-corners::after {
            bottom: 15px; right: 15px;
            border-width: 0 2px 2px 0;
        }

        /* Nome Central Impactante */
        .tech-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 5.5rem;
            font-weight: 900;
            letter-spacing: -2px;
            text-transform: lowercase; /* Apenas coreonx */
            background: linear-gradient(135deg, #ffffff 30%, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 0 10px rgba(0, 242, 254, 0.3));
        }

        /* Mensagem Futurista e Tecnológica */
        .tech-message {
            font-size: 1.3rem;
            line-height: 1.6;
            color: #7e8cba;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .tech-message span {
            color: #00f2fe;
        }

        /* --- ANIMAÇÃO DE FLUXO PADRÃO (SUPORTE TOTAL) --- */
        @keyframes techFlux {
            0% {
                background-position: 0px 0px, 0px 0px, 0px 0px, 0.5% 50%;
            }
            100% {
                background-position: 40px 40px, 40px 40px, 80px 80px, 50% 50%;
            }
        }

        /* Responsividade para Celulares */
        @media (max-width: 768px) {
            .tech-name { font-size: 3.5rem; }
            .cyber-card { padding: 3rem 2rem; }
            .tech-message { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <!-- Fundo de Fluxo Gerado por Estrutura Matemática de Cores (Inquebrável) -->
    <div class="tech-bg"></div>

    <!-- Container Otimizado para Monitores de Alta Resolução -->
    <div class="main-container">
        
        <!-- Card Central -->
        <div class="cyber-card">
            <!-- Cantos HUD do Card -->
            <div class="card-corners"></div>
            
            <!-- Nome Puro -->
            <h1 class="tech-name">coreonx</h1>
            
            <!-- Mensagem Futurista -->
            <p class="tech-message">
                [ sistema online ] <br>
                desmistificando o amanhã através do <span>código</span>.
            </p>
        </div>

    </div>

</body>
</html>
