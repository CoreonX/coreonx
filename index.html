<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>coreonx // tech_space</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        /* Reset de Tela */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Share Tech Mono', monospace;
            background-color: #020208;
            overflow: hidden;
            position: relative;
        }

        /* --- CAMADA 1: GRADIENTE DE FUNDO --- */
        .bg-gradient {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 100%, #0a1128 0%, #020208 80%);
            z-index: 1;
        }

        /* --- CAMADA 2: ONDAS FLUIDAS --- */
        .waves-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2;
            overflow: hidden;
        }

        .wave {
            position: absolute;
            bottom: -60vh;
            left: -50vw;
            width: 200vw;
            height: 200vw;
            background: rgba(0, 242, 254, 0.02);
            border: 1px solid rgba(0, 242, 254, 0.05);
            border-radius: 43%;
            animation: spinWaves linear infinite;
        }

        .wave-2 {
            bottom: -65vh;
            background: rgba(138, 43, 226, 0.02);
            border: 1px solid rgba(138, 43, 226, 0.05);
            border-radius: 40%;
            animation-duration: 22s;
            animation-direction: reverse;
        }

        .wave-3 {
            bottom: -70vh;
            background: rgba(0, 242, 254, 0.01);
            border-radius: 45%;
            animation-duration: 28s;
        }

        /* --- CAMADA 3: GRADE TECNOLÓGICA --- */
        .bg-grid {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 242, 254, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 254, 0.04) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 3;
        }

        /* --- CAMADA 4: PARTÍCULAS DE LUZ (DATA DUST) --- */
        .particles-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 4;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            bottom: -10px;
            border-radius: 50%;
            background: #00f2fe;
            box-shadow: 0 0 10px #00f2fe, 0 0 20px #00f2fe;
            animation: floatParticle linear infinite;
            opacity: 0;
        }

        /* Variando tamanhos, posições e velocidades das partículas */
        .p1 { width: 3px; height: 3px; left: 10%; animation-duration: 12s; animation-delay: 0s; }
        .p2 { width: 2px; height: 2px; left: 25%; animation-duration: 15s; animation-delay: 3s; background: #8a2be2; box-shadow: 0 0 10px #8a2be2; }
        .p3 { width: 4px; height: 4px; left: 45%; animation-duration: 10s; animation-delay: 1s; }
        .p4 { width: 2px; height: 2px; left: 60%; animation-duration: 18s; animation-delay: 5s; }
        .p5 { width: 5px; height: 5px; left: 75%; animation-duration: 14s; animation-delay: 2s; background: #8a2be2; box-shadow: 0 0 10px #8a2be2; }
        .p6 { width: 3px; height: 3px; left: 85%; animation-duration: 11s; animation-delay: 4s; }
        .p7 { width: 2px; height: 2px; left: 35%; animation-duration: 16s; animation-delay: 6s; }
        .p8 { width: 4px; height: 4px; left: 95%; animation-duration: 13s; animation-delay: 1.5s; }
        .p9 { width: 3px; height: 3px; left: 5%; animation-duration: 17s; animation-delay: 7s; background: #8a2be2; box-shadow: 0 0 10px #8a2be2; }
        .p10 { width: 5px; height: 5px; left: 55%; animation-duration: 19s; animation-delay: 0.5s; }

        /* --- CAMADA 5: CONTEÚDO PRINCIPAL (CARD) --- */
        .main-content {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cyber-card {
            background-color: #03050d;
            border: 1px solid #00f2fe;
            border-radius: 15px;
            padding: 4rem 6rem;
            text-align: center;
            box-shadow: 0 0 40px rgba(0, 242, 254, 0.15), inset 0 0 20px rgba(0, 242, 254, 0.05);
            position: relative;
            max-width: 800px;
            width: 90%;
        }

        /* Detalhes nos cantos */
        .corner {
            position: absolute;
            width: 20px; height: 20px;
            border-color: #00f2fe;
            border-style: solid;
        }
        .top-left { top: 12px; left: 12px; border-width: 2px 0 0 2px; }
        .top-right { top: 12px; right: 12px; border-width: 2px 2px 0 0; }
        .bottom-left { bottom: 12px; left: 12px; border-width: 0 0 2px 2px; }
        .bottom-right { bottom: 12px; right: 12px; border-width: 0 2px 2px 0; }

        /* Textos */
        .tech-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 5rem;
            font-weight: 900;
            letter-spacing: -2px;
            text-transform: lowercase;
            color: #00f2fe;
            text-shadow: 0 0 25px rgba(0, 242, 254, 0.6);
            margin-bottom: 1rem;
        }

        .tech-message {
            font-size: 1.2rem;
            color: #8fa0c9;
            letter-spacing: 2px;
            line-height: 1.6;
            text-transform: uppercase;
        }

        .tech-message span {
            color: #fff;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        /* --- ANIMAÇÕES CSS --- */
        @keyframes spinWaves {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes floatParticle {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 0.8; }
            50% { transform: translateY(-50vh) translateX(20px); opacity: 1; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-110vh) translateX(-20px); opacity: 0; }
        }

        /* Responsividade */
        @media (max-width: 768px) {
            .tech-name { font-size: 3rem; }
            .cyber-card { padding: 3rem 1.5rem; }
            .tech-message { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <div class="bg-gradient"></div>

    <div class="waves-container">
        <div class="wave" style="animation-duration: 18s;"></div>
        <div class="wave wave-2"></div>
        <div class="wave wave-3"></div>
    </div>

    <div class="bg-grid"></div>

    <div class="particles-container">
        <div class="particle p1"></div>
        <div class="particle p2"></div>
        <div class="particle p3"></div>
        <div class="particle p4"></div>
        <div class="particle p5"></div>
        <div class="particle p6"></div>
        <div class="particle p7"></div>
        <div class="particle p8"></div>
        <div class="particle p9"></div>
        <div class="particle p10"></div>
    </div>

    <div class="main-content">
        <div class="cyber-card">
            <div class="corner top-left"></div>
            <div class="corner top-right"></div>
            <div class="corner bottom-left"></div>
            <div class="corner bottom-right"></div>
            
            <h1 class="tech-name">coreonx</h1>
            <p class="tech-message">
                [ sistema online ] <br>
                desmistificando o amanhã através do <span>código</span>.
            </p>
        </div>
    </div>

</body>
</html>
