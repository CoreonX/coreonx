<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Em Breve</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500&display=swap" rel="stylesheet">
    
    <style>
        /* Reset básico */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            overflow: hidden; /* Impede rolagem na tela */
            font-family: 'Rajdhani', sans-serif;
            background-color: #050505;
        }

        /* Container principal que cobre toda a tela */
        .background-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1a0b2e 0%, #050505 100%);
            overflow: hidden;
        }

        /* Caixa de conteúdo centralizada (Efeito Glassmorphism) */
        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            padding: 4rem 6rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px); /* Efeito de vidro borrado */
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 0 40px rgba(138, 43, 226, 0.2);
        }

        /* Estilo do título "EM BREVE" */
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 5rem;
            color: #ffffff;
            letter-spacing: 12px;
            text-transform: uppercase;
            margin-bottom: 1rem;
            /* Brilho Neon */
            text-shadow: 
                0 0 10px #00ffff, 
                0 0 20px #00ffff, 
                0 0 40px #00ffff, 
                0 0 80px #8a2be2;
            animation: pulse-neon 3s infinite alternate;
        }

        /* Subtítulo */
        p {
            color: #b3b3b3;
            font-size: 1.5rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* Animação de pulsação do Neon */
        @keyframes pulse-neon {
            0% { text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff, 0 0 40px #00ffff; }
            100% { text-shadow: 0 0 10px #8a2be2, 0 0 20px #8a2be2, 0 0 40px #8a2be2, 0 0 80px #00ffff; }
        }
        
        /* Responsividade para celulares */
        @media (max-width: 768px) {
            h1 {
                font-size: 3rem;
                letter-spacing: 6px;
            }
            .content {
                padding: 2.5rem 2rem;
                width: 90%;
            }
            p {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <div class="background-container">
        <div class="content">
            <h1>EM BREVE</h1>
            <p>O Futuro já começou</p>
        </div>
    </div>

</body>
</html>
